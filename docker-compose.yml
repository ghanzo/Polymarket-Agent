services:
  app:
    build: .
    container_name: polymarket-app
    env_file: .env
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build: .
    container_name: polymarket-dashboard
    env_file: .env
    volumes:
      - ./src:/app/src
    ports:
      - "8000:8000"
    command: ["python", "-m", "uvicorn", "src.dashboard:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/status')"]
      interval: 60s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: polymarket-db
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-polymarket}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-polymarket}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-polymarket}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
